<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZORA — Admin login</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0A0B'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%233D5AFE' stroke-width='3'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#0A0A0B;--ink:#101012;--hair:#222226;--bone:#F4F1EA;--mut:#8A877E;--blue:#3D5AFE;--orange:#FF5A1F;
        --sans:'Archivo',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--black);color:var(--bone);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:400px;border:1px solid var(--hair);padding:44px 36px}
  .wordmark{font-weight:600;font-size:26px;letter-spacing:-.02em}
  .wordmark .o{color:var(--blue)}
  .sub{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--mut);margin:10px 0 34px}
  label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.25em;color:var(--mut);margin-bottom:8px}
  input{width:100%;background:var(--ink);border:1px solid var(--hair);color:var(--bone);font-family:var(--mono);font-size:15px;padding:13px 15px;outline:none;margin-bottom:20px;border-radius:0}
  input:focus{border-color:var(--blue)}
  button{width:100%;background:var(--bone);color:var(--black);border:none;font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.2em;padding:15px;cursor:pointer;transition:background .2s}
  button:hover{background:var(--blue);color:var(--bone)}
  .err{display:none;font-family:var(--mono);font-size:12px;color:var(--orange);letter-spacing:.05em;margin-top:16px;border:1px dashed var(--orange);padding:12px 14px}
  .back{display:block;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:var(--mut);margin-top:26px;text-decoration:none}
  .back:hover{color:var(--bone)}
</style>
<link rel="stylesheet" href="/zora-tokens.css">
<script src="/zora-theme.js"></script>
</head>
<body>
  <div class="card">
    <p class="wordmark">z<span class="o">o</span>ra</p>
    <p class="sub">CONTROL ROOM — AUTHORIZED ONLY</p>
    <form id="login-form">
      <label for="u">USERNAME</label>
      <input id="u" autocomplete="username" required>
      <label for="p">PASSWORD</label>
      <input id="p" type="password" autocomplete="current-password" required>
      <button type="submit">ENTER</button>
      <p class="err" id="err"></p>
    </form>
    <a class="back" href="/">&larr; BACK TO THE SITE</a>
  </div>
<script>
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.style.display = 'none';
    try {
      const r = await fetch('/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value })
      });
      if (!r.ok){ const d = await r.json().catch(() => ({})); throw new Error(d.error || 'Login failed'); }
      location.reload();
    } catch (ex) {
      err.textContent = String(ex.message || ex).toUpperCase();
      err.style.display = 'block';
    }
  });
</script>
</body>
</html>
