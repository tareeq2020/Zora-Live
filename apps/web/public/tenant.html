<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event — Zora white-label store</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0A0B'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%233D5AFE' stroke-width='3'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0A0B10; --panel:#14151C; --ink:#F4F1EA; --mut:#8B8C97; --hair:rgba(255,255,255,.12); --accent:#4C6FFF; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  .aura{background:linear-gradient(90deg,#D53AD8,#FF4D7D,#FF9145)}
  .wrap{max-width:720px;margin:0 auto;padding:22px 22px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 26px}
  .store{display:flex;align-items:center;gap:11px}
  .store .badge{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;background:var(--panel);border:1px solid var(--hair)}
  .store .sn{font-weight:700;font-size:15px;line-height:1.1}
  .store .su{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);letter-spacing:.04em;margin-top:2px}
  .whitelabel{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--mut);border:1px solid var(--hair);border-radius:99px;padding:6px 11px}
  .aura-line{height:4px;border-radius:2px;margin-bottom:30px}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;color:var(--mut);margin-bottom:14px}
  h1{font-size:clamp(34px,7vw,58px);line-height:1.02;letter-spacing:-.01em;font-weight:700}
  .tagline{color:var(--mut);font-size:17px;margin-top:14px;line-height:1.5}
  .cover{margin:28px 0;height:190px;border-radius:20px;position:relative;overflow:hidden;background:linear-gradient(140deg,var(--a,#4C6FFF),#0A0B10);border:1px solid var(--hair)}
  .cover::after{content:'';position:absolute;inset:0;background:radial-gradient(70% 80% at 80% 10%,rgba(255,255,255,.16),transparent 60%)}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:26px 0}
  .meta .k{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--mut)}
  .meta .v{font-size:19px;font-weight:500;margin-top:5px}
  .buy{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--hair);border-radius:18px;padding:20px 22px;margin-top:8px}
  .price small{display:block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;color:var(--mut)}
  .price b{font-size:28px;font-weight:700}
  .cta{border:none;cursor:pointer;color:#fff;font-family:inherit;font-weight:700;font-size:15px;letter-spacing:.02em;padding:15px 26px;border-radius:12px}
  .nofee{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);letter-spacing:.03em;margin-top:16px;text-align:center}
  .foot{margin-top:44px;padding-top:22px;border-top:1px solid var(--hair);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;color:var(--mut);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.04em}
  .foot a{color:var(--ink);text-decoration:none}
  .runs .o{background:linear-gradient(90deg,#D53AD8,#FF4D7D,#FF9145);-webkit-background-clip:text;background-clip:text;color:transparent}
  .err{padding:60px 0;text-align:center;color:var(--mut)}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);font-weight:600;font-size:14px;padding:13px 20px;border-radius:12px;opacity:0;transition:.28s;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<div class="wrap" id="wrap">
  <div class="err" id="loading">Loading…</div>
</div>
<div class="toast" id="toast"></div>

<script>
  const $ = id => document.getElementById(id);
  function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._); t._=setTimeout(()=>t.classList.remove('on'),2600); }
  const PAL = { Festivals:'#B23A17', Nightlife:'#3D2A8F', Concerts:'#1E4FD8', Daytime:'#C46A28', Arts:'#0F6E56' };
  const CUR = { dar:'TZS', zanzibar:'TZS', nairobi:'KES', accra:'GHS', lagos:'NGN' };

  function parseRoute(){
    const path = location.pathname, host = location.hostname;
    let handle = null, id = null;
    const m = path.match(/^\/@([^/]+)(?:\/events\/([^/]+))?/);
    if (m){ handle = m[1]; id = m[2] || null; }
    else {
      const em = path.match(/^\/events\/([^/]+)/); if (em) id = em[1];
      const parts = host.split('.'); if (parts.length > 2 && parts[0] !== 'www') handle = parts[0];
    }
    return { handle, id };
  }

  async function boot(){
    const { handle, id } = parseRoute();
    if (!id){ $('wrap').innerHTML = '<div class="err">No event specified.</div>'; return; }
    let ev, org;
    try {
      ev = await fetch('/api/events/' + encodeURIComponent(id)).then(r => { if(!r.ok) throw 0; return r.json(); });
      const h = handle || ev.organizerHandle;
      org = await fetch('/api/tenant/' + encodeURIComponent(h)).then(r => r.ok ? r.json() : null);
    } catch { $('wrap').innerHTML = '<div class="err">This event could not be found.</div>'; return; }

    const cur = CUR[ev.city] || 'TZS';
    const price = (ev.priceFrom != null ? ev.priceFrom : 0).toLocaleString();
    const orgName = (org && org.name) || ev.organizer || 'Organizer';
    const sub = (org && org.subdomain) || ev.subdomain || '';
    document.title = ev.name + ' — ' + orgName;

    $('wrap').innerHTML =
      '<div class="topbar">' +
        '<div class="store"><div class="badge">' + orgName.charAt(0) + '</div>' +
          '<div><div class="sn">' + orgName + '</div><div class="su">' + sub + '</div></div></div>' +
        '<span class="whitelabel">WHITE-LABEL STORE</span>' +
      '</div>' +
      '<div class="aura-line aura"></div>' +
      '<p class="eyebrow">' + (ev.category || 'EVENT').toUpperCase() + ' · ' + (ev.city || '').toUpperCase() + '</p>' +
      '<h1>' + ev.name + '</h1>' +
      (ev.tagline ? '<p class="tagline">' + ev.tagline + '</p>' : '') +
      '<div class="cover" style="--a:' + (PAL[ev.category] || '#4C6FFF') + '"></div>' +
      '<div class="meta">' +
        '<div><div class="k">DATE</div><div class="v">' + (ev.dateLabel || 'TBA') + (ev.time ? ' · ' + ev.time : '') + '</div></div>' +
        '<div><div class="k">VENUE</div><div class="v">' + (ev.venue || 'TBA') + '</div></div>' +
      '</div>' +
      '<div class="buy">' +
        '<span class="price"><small>FROM</small><b>' + cur + ' ' + price + '</b></span>' +
        '<button class="cta ' + (ev.seated ? '' : 'aura') + '" id="cta" style="' + (ev.seated ? 'background:var(--accent)' : '') + '">' + (ev.seated ? 'CHOOSE YOUR SEATS →' : 'GET TICKET') + '</button>' +
      '</div>' +
      '<p class="nofee">The price is the price. No fees at checkout.</p>' +
      '<div class="foot"><span class="runs">runs on z<span class="o">o</span>ra</span>' +
        '<a href="/discover.html">← back to the marketplace</a></div>';

    $('cta').addEventListener('click', () => {
      if (ev.seated) { location.href = '/seatmap.html?ev=' + encodeURIComponent(ev.name); return; }
      toast('Your pass is waiting in the Zora app — download to claim');
    });
  }
  boot();
</script>
