# legacy/ is intentionally NOT a workspace member: the legacy oracle keeps its
# own self-contained npm node_modules so pnpm hoisting can't alter its runtime
# behavior during the migration. It boots via `npm --prefix legacy/zora-site start`.
packages:
  - "apps/*"
  # apps/mobile (Expo) keeps its own npm tooling until Phase 4; excluding it here
  # stops pnpm from pulling the whole React Native dep tree into the workspace.
  - "!apps/mobile"
  - "packages/*"
